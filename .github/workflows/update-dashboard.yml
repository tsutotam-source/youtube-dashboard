name: Update YouTube dashboard

on:
  workflow_dispatch:
  schedule:
    # 毎日4:37（日本時間）に実行
    - cron: "37 4 * * *"
      timezone: "Asia/Tokyo"
      
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch YouTube videos
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5-mini
          MAX_VIDEOS_PER_CHANNEL: "8"
        run: python scripts/update_videos.py

      - name: Commit updated data
        run: |
          git config user.name "youtube-dashboard-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/videos.json
          git diff --cached --quiet || git commit -m "Update YouTube dashboard"
          git push
