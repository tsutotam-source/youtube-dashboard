<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache" />
  <title>YouTube新着ダッシュボード</title>
  <style>
    :root {
      --bg: #f5f6f8;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #2563eb;
      --high: #b91c1c;
      --medium: #b45309;
      --low: #15803d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255,255,255,.96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(8px);
    }
    .header-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    h1 { margin: 0; font-size: 23px; }
    .updated { color: var(--muted); font-size: 13px; margin-top: 5px; }
    .channel-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }
    main { max-width: 1180px; margin: 22px auto; padding: 0 20px 48px; }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }
    .stat, .toolbar, .notice, .video-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
    }
    .stat { padding: 17px; }
    .stat-label { color: var(--muted); font-size: 13px; }
    .stat-value { font-size: 27px; font-weight: 750; margin-top: 5px; }
    .notice {
      padding: 16px 18px;
      margin-bottom: 16px;
      line-height: 1.65;
    }
    .notice strong { display: block; margin-bottom: 4px; }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr 230px 170px;
      gap: 10px;
      padding: 13px;
      margin-bottom: 16px;
    }
    input, select {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: #fff;
      font: inherit;
      font-size: 14px;
    }
    .video-list { display: grid; gap: 13px; }
    .video-card {
      display: grid;
      grid-template-columns: 210px minmax(0, 1fr) 135px;
      gap: 17px;
      padding: 16px;
      align-items: start;
    }
    .thumb {
      width: 210px;
      aspect-ratio: 16/9;
      object-fit: cover;
      background: #e5e7eb;
      border-radius: 10px;
    }
    .channel { color: var(--muted); font-size: 13px; margin-bottom: 3px; }
    .title { margin: 0 0 7px; font-size: 18px; line-height: 1.45; }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 14px;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 9px;
    }
    .summary { line-height: 1.7; margin: 0 0 11px; }
    .tags { display: flex; gap: 7px; flex-wrap: wrap; }
    .tag {
      padding: 5px 9px;
      border-radius: 999px;
      background: #f3f4f6;
      font-size: 12px;
    }
    .actions { text-align: right; }
    .priority {
      display: inline-block;
      color: #fff;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      margin-bottom: 11px;
    }
    .priority.high { background: var(--high); }
    .priority.medium { background: var(--medium); }
    .priority.low { background: var(--low); }
    .watch {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      padding: 10px 13px;
      border-radius: 9px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 650;
    }
    .empty {
      padding: 44px 22px;
      text-align: center;
      color: var(--muted);
      background: var(--panel);
      border: 1px dashed var(--line);
      border-radius: 14px;
      line-height: 1.7;
    }
    .error { color: #b91c1c; }
    @media (max-width: 840px) {
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .toolbar { grid-template-columns: 1fr; }
      .video-card { grid-template-columns: 1fr; }
      .thumb { width: 100%; }
      .actions { text-align: left; }
    }
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <div>
      <h1>YouTube新着ダッシュボード</h1>
      <div class="updated" id="updatedAt">データを読み込み中です</div>
    </div>
    <a class="channel-link" href="https://www.youtube.com/@neko_Ypapa"
       target="_blank" rel="noopener noreferrer">登録チャンネルを開く ↗</a>
  </div>
</header>

<main>
  <section class="stats">
    <div class="stat"><div class="stat-label">登録チャンネル</div><div class="stat-value" id="channelCount">—</div></div>
    <div class="stat"><div class="stat-label">取得動画</div><div class="stat-value" id="videoCount">—</div></div>
    <div class="stat"><div class="stat-label">高優先度</div><div class="stat-value" id="highCount">—</div></div>
    <div class="stat"><div class="stat-label">合計再生時間</div><div class="stat-value" id="totalMinutes">—</div></div>
  </section>

  <section class="notice" id="recommendation">
    <strong>今日1本だけ見るなら</strong>
    データの更新後に表示します。
  </section>

  <section class="toolbar">
    <input id="searchBox" type="search" placeholder="タイトル・チャンネル・要約を検索">
    <select id="channelFilter"><option value="">すべてのチャンネル</option></select>
    <select id="priorityFilter">
      <option value="">すべての優先度</option>
      <option value="high">高</option>
      <option value="medium">中</option>
      <option value="low">低</option>
    </select>
  </section>

  <section id="videoList" class="video-list"></section>
</main>

<script>
  let videos = [];

  const priorityLabel = {
    high: "高優先度",
    medium: "中優先度",
    low: "低優先度"
  };

  function escapeHtml(value) {
    return String(value ?? "").replace(/[&<>"']/g, ch => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
    }[ch]));
  }

  function formatDate(value) {
    if (!value) return "不明";
    const date = new Date(value);
    return Number.isNaN(date.getTime())
      ? value
      : date.toLocaleString("ja-JP", { timeZone: "Asia/Tokyo" });
  }

  function render() {
    const query = document.getElementById("searchBox").value.trim().toLowerCase();
    const channel = document.getElementById("channelFilter").value;
    const priority = document.getElementById("priorityFilter").value;

    const filtered = videos.filter(v => {
      const target = [
        v.channel, v.title, v.summary, ...(v.tags || [])
      ].join(" ").toLowerCase();

      return (!query || target.includes(query))
        && (!channel || v.channel === channel)
        && (!priority || v.priority === priority);
    });

    const list = document.getElementById("videoList");

    if (!filtered.length) {
      list.innerHTML = `
        <div class="empty">
          表示できる動画がありません。<br>
          初回はGitHub Actionsの「Run workflow」を実行してください。
        </div>`;
      return;
    }

    list.innerHTML = filtered.map(v => `
      <article class="video-card">
        <img class="thumb" src="${escapeHtml(v.thumbnail)}" alt="" loading="lazy">
        <div>
          <div class="channel">${escapeHtml(v.channel)}</div>
          <h2 class="title">${escapeHtml(v.title)}</h2>
          <div class="meta">
            <span>公開: ${escapeHtml(formatDate(v.published))}</span>
            <span>${v.durationMinutes ? `再生時間: ${escapeHtml(v.durationMinutes)}分` : "再生時間: 未取得"}</span>
          </div>
          <p class="summary">${escapeHtml(v.summary || "要約はありません。")}</p>
          <div class="tags">${(v.tags || []).map(tag =>
            `<span class="tag">${escapeHtml(tag)}</span>`
          ).join("")}</div>
        </div>
        <div class="actions">
          <span class="priority ${escapeHtml(v.priority || "medium")}">
            ${escapeHtml(priorityLabel[v.priority] || "中優先度")}
          </span><br>
          <a class="watch" href="${escapeHtml(v.url)}"
             target="_blank" rel="noopener noreferrer">YouTubeで見る</a>
        </div>
      </article>
    `).join("");
  }

  async function loadData() {
    const list = document.getElementById("videoList");
    try {
      const response = await fetch(`data/videos.json?ts=${Date.now()}`, { cache: "no-store" });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const data = await response.json();

      videos = Array.isArray(data.videos) ? data.videos : [];

      document.getElementById("channelCount").textContent = data.channelCount ?? 0;
      document.getElementById("videoCount").textContent = videos.length;
      document.getElementById("highCount").textContent =
        videos.filter(v => v.priority === "high").length;

      const total = videos.reduce((sum, v) => sum + Number(v.durationMinutes || 0), 0);
      document.getElementById("totalMinutes").textContent = total ? `${total}分` : "—";
      document.getElementById("updatedAt").textContent =
        data.updatedAt ? `最終更新: ${formatDate(data.updatedAt)}` : "初回更新前";

      const channels = [...new Set(videos.map(v => v.channel).filter(Boolean))].sort();
      const select = document.getElementById("channelFilter");
      channels.forEach(name => {
        const option = document.createElement("option");
        option.value = name;
        option.textContent = name;
        select.appendChild(option);
      });

      const best = videos.find(v => v.priority === "high") || videos[0];
      document.getElementById("recommendation").innerHTML = best
        ? `<strong>今日1本だけ見るなら</strong>${escapeHtml(best.title)}<br>
           <span style="color:#6b7280">${escapeHtml(best.summary || "")}</span>`
        : `<strong>初回更新待ち</strong>${escapeHtml(data.message || "動画データがありません。")}`;

      render();
    } catch (error) {
      document.getElementById("updatedAt").textContent = "データ読込エラー";
      list.innerHTML = `
        <div class="empty error">
          data/videos.jsonを読み込めませんでした。<br>
          index.htmlを直接開くのではなく、GitHub Pages上で確認してください。
        </div>`;
    }
  }

  ["searchBox", "channelFilter", "priorityFilter"].forEach(id => {
    document.getElementById(id).addEventListener("input", render);
  });

  loadData();
</script>
</body>
</html>
